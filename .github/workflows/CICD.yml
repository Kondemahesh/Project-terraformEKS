

name: Deploy on EKS

on:
  push:
    branches: [ "main" ]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug — List repo contents
      run: ls -R

    - name: Debug — List springboot-EKS folder
      run: ls -la springboot-EKS
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn compile
      working-directory: /home/runner/work/Project-terraformEKS/springboot-eks

    
